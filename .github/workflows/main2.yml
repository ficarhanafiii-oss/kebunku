name: Build Kebunku AAB (Signed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install npm dependencies
        run: npm install

      - name: Install Ionic & Angular CLI
        run: npm install -g @ionic/cli @capacitor/cli @angular/cli

      - name: Build Angular app (production)
        run: npx ng build app --configuration production

      - name: Prepare Capacitor icon resource
        run: |
          mkdir -p resources
          cp src/assets/icon/logo_kebunku.png resources/icon.png
          cp src/assets/icon/logo_kebunku.png resources/icon-foreground.png

      - name: Add Android platform
        run: npx cap add android

      - name: Capacitor sync Android
        run: npx cap sync android

      - name: Set targetSdkVersion to 35
        run: |
          sed -i 's/targetSdkVersion = .*/targetSdkVersion = 35/' android/variables.gradle
          sed -i 's/compileSdkVersion = .*/compileSdkVersion = 35/' android/variables.gradle
          cat android/variables.gradle

      - name: Install Python image tools for icon resizing
        run: pip install Pillow

      - name: Resize and copy logo as launcher icons
        run: |
          python3 - <<'PYEOF'
          from PIL import Image
          import os

          src = "src/assets/icon/logo_kebunku.png"
          img = Image.open(src).convert("RGBA")

          densities = {
            "mipmap-mdpi":    48,
            "mipmap-hdpi":    72,
            "mipmap-xhdpi":   96,
            "mipmap-xxhdpi":  144,
            "mipmap-xxxhdpi": 192,
          }

          for folder, size in densities.items():
            path = f"android/app/src/main/res/{folder}"
            os.makedirs(path, exist_ok=True)
            resized = img.resize((size, size), Image.LANCZOS)
            resized.save(f"{path}/ic_launcher.png")
            resized.save(f"{path}/ic_launcher_round.png")
            print(f"Saved {size}x{size} -> {path}")
          PYEOF

      - name: Remove adaptive icon XML (prevent Capacitor default override)
        run: |
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Decode Keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/kebunku.keystore

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build AAB Release
        run: cd android && ./gradlew bundleRelease

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: kebunku-release-signed.aab
          path: ${{ steps.sign_aab.outputs.signedReleaseFile }}
          retention-days: 30
          
